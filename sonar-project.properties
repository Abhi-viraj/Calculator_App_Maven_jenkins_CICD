# ════════════════════════════════════════════════════════════════
# sonar-project.properties
# ════════════════════════════════════════════════════════════════
# This file is read by the SonarQube Scanner (sonar:sonar goal).
# Place it in the ROOT of your project (same folder as pom.xml).
#
# Most of these properties are also set inside pom.xml <properties>
# section — this file is a fallback / standalone scanner config.
# ════════════════════════════════════════════════════════════════

# ── Project Identity ─────────────────────────────────────────────
# Must match what you see in SonarQube dashboard.
sonar.projectKey=FancyStore
sonar.projectName=FancyStore
sonar.projectVersion=1.0

# ── Source & Test Directories ────────────────────────────────────
sonar.sources=src/main/java
sonar.tests=src/test/java

# Compiled class files (Maven puts them here after 'compile' goal)
sonar.java.binaries=target/classes

# ── Language ─────────────────────────────────────────────────────
sonar.language=java
sonar.sourceEncoding=UTF-8

# ── JaCoCo Code Coverage Report ──────────────────────────────────
# SonarQube reads this XML file to display coverage % on dashboard.
# File is generated by:  mvn verify  (jacoco:report execution)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ── Surefire Unit Test Results ───────────────────────────────────
# SonarQube reads these to show passed/failed unit tests.
sonar.junit.reportPaths=target/surefire-reports

# ── Exclusions ───────────────────────────────────────────────────
# Skip auto-generated or boilerplate classes from analysis.
sonar.exclusions=\
    **/CalculatorResponse.java,\
    **/target/**,\
    **/*.xml,\
    **/*.html,\
    **/*.jsp

# ── SonarQube Server (override in Jenkins via env-vars instead) ──
# ⚠️  Do NOT hard-code your token here (security risk).
#     Jenkins injects these automatically via the
#     "SonarQube Scanner" build wrapper + Manage Jenkins → System.
#
# sonar.host.url=http://<EC2-IP>:9000
# sonar.login=<YOUR_SONAR_TOKEN>
